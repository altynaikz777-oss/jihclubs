name: jihc_clubs_hub
description: "JIHC Clubs mobile app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  cloud_firestore: ^5.6.12
  firebase_auth: ^5.6.1
  firebase_core: ^3.15.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  google_sign_in: ^6.3.0
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/jihc_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/jihc_logo.png
  web:
    generate: true
    image_path: assets/images/jihc_logo.png
